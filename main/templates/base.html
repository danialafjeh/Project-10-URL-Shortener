<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #262727, #656565);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 74, 177, 0.2);
            padding: 2rem;
            width: 100%;
            max-width: 480px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #0f172a;
        }

        label {
            display: block;
            font-size: .875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: .25rem;
        }

        input,
        textarea {
            width: 100%;
            padding: .625rem .75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: .875rem;
            margin-bottom: 1rem;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #2200e4;
            box-shadow: 0 0 0 3px rgba(22, 0, 190, 0.15);
        }

        textarea {
            resize: vertical;
        }

        button {
            width: 100%;
            padding: .75rem;
            background: #0d0f94;
            color: #fff;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: .875rem;
        }

        button:hover {
            background: #5050e4;
        }
    </style>
</head>
<body>
    {% block content %}

    {% endblock %}
</body>
</html>
